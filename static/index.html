<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ishda | Face ID Davomat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        header {
            padding: 24px;
            background: var(--card);
            border-bottom: 1px solid #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .welcome-text h1 {
            font-size: 18px;
            font-weight: 800;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-sub);
        }

        main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .scanner-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-frame {
            width: 70%;
            height: 70%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .status-card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #e2e8f0;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .status-info h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .status-info p {
            font-size: 12px;
            color: var(--text-sub);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: auto;
            padding-bottom: 24px;
        }

        .btn {
            height: 60px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-in {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-out {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.96);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 32px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="welcome-text">
                    <h1 id="user-name">Xush kelibsiz!</h1>
                    <p id="current-date">Bugun: 26 Aprel, Yakshanba</p>
                </div>
            </div>
        </header>

        <main>
            <div class="scanner-container">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay">
                    <div class="scan-frame"></div>
                </div>
                <div id="loader" class="loading-overlay">
                    <div class="loader"></div>
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">Face ID yuklanmoqda...</p>
                </div>
            </div>

            <div class="status-card">
                <div class="status-icon">🕒</div>
                <div class="status-info">
                    <h3>Oxirgi faollik</h3>
                    <p id="last-activity">Ma'lumot mavjud emas</p>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn btn-in" onclick="handleCheck('in')">
                    <span>👋</span> Keldim
                </button>
                <button class="btn btn-out" onclick="handleCheck('out')">
                    <span>🏠</span> Ketdim
                </button>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');

        // Vaqtni sozlash
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = "Bugun: " + now.toLocaleDateString('uz-UZ', options);

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${tg.initDataUnsafe.user.photo_url}" style="width:100%;height:100%;border-radius:14px;">`;
            }
        }

        // Kamera yoqish
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                loader.style.display = 'none';
            } catch (err) {
                console.error("Kamera xatosi:", err);
                alert("Kameraga ruxsat berilmadi!");
            }
        }

        async function handleCheck(type) {
            tg.HapticFeedback.impactOccurred('medium');
            const statusText = type === 'in' ? "Kelganingiz tasdiqlanmoqda..." : "Ketishingiz tasdiqlanmoqda...";
            
            tg.showConfirm(type === 'in' ? "Kelganingizni tasdiqlaysizmi?" : "Ketayotganingizni tasdiqlaysizmi?", (ok) => {
                if (ok) {
                    tg.showAlert("Muvaffaqiyatli! Yuzingiz aniqlandi.");
                    document.getElementById('last-activity').innerText = (type === 'in' ? "Keldi: " : "Ketdi: ") + new Date().toLocaleTimeString();
                }
            });
        }

        startCamera();
    </script>
</body>
</html>
