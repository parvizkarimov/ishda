<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ishda | Face ID Davomat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        header {
            padding: 24px;
            background: var(--card);
            border-bottom: 1px solid #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .welcome-text h1 {
            font-size: 18px;
            font-weight: 800;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-sub);
        }

        main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .scanner-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-frame {
            width: 70%;
            height: 70%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .status-card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #e2e8f0;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .status-info h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .status-info p {
            font-size: 12px;
            color: var(--text-sub);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: auto;
            padding-bottom: 24px;
        }

        .btn {
            height: 60px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-in {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-out {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.96);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 32px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .detection-guide {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            z-index: 20;
            display: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 11;
            display: none;
        }

        /* Ish vaqti kartasi */
        .work-status-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .work-timer {
            text-align: center;
            margin-bottom: 15px;
        }

        .timer-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .history-item:last-child { border-bottom: none; }

        .btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="welcome-text">
                    <h1 id="user-name">Xush kelibsiz!</h1>
                    <p id="current-date">Bugun: 26 Aprel, Yakshanba</p>
                </div>
            </div>
        </header>

        <main>
            <div class="scanner-container">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay">
                    <div class="scan-frame"></div>
                </div>
                <div id="loader" class="loading-overlay">
                    <div class="loader"></div>
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">Face ID yuklanmoqda...</p>
                </div>
                <div id="detection-guide" class="detection-guide">Yuzingizni to'g'ri tuting</div>
                <div id="countdown" class="countdown-overlay">3</div>
            </div>

            <div class="status-card">
                <div class="status-icon">🕒</div>
                <div class="status-info">
                    <h3>Oxirgi faollik</h3>
                    <p id="last-activity">Ma'lumot mavjud emas</p>
                </div>
            </div>

            <div class="action-btns">
                <button id="btn-in" class="btn btn-in" onclick="handleCheck('in')">
                    <span>👋</span> Keldim
                </button>
                <button id="btn-out" class="btn btn-out" onclick="handleCheck('out')">
                    <span>🏠</span> Ketdim
                </button>
            </div>

            <!-- Yangi: Ish holati kartasi -->
            <div id="work-status-section" class="work-status-card" style="display: none;">
                <div class="work-timer">
                    <p style="font-size: 13px; color: var(--text-sub); margin-bottom: 5px;">Bugun ishlamoqdasiz:</p>
                    <div id="timer-display" class="timer-value">00:00:00</div>
                    <p id="first-in-display" style="font-size: 12px; color: var(--text-sub); margin-top: 5px;"></p>
                </div>
                
                <div style="margin-top: 15px;">
                    <p style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">Bugungi harakatlar:</p>
                    <ul id="today-log" class="history-list">
                        <!-- Loglar shu yerga tushadi -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const statusText = document.querySelector('#loader p');
        const lastActivityText = document.getElementById('last-activity');
        
        let modelsLoaded = false;
        let isRegistered = false;
        let savedDescriptor = null;
        let currentDescriptor = null;
        let promptTriggered = false;
        let promptCooldown = false;
        let detectionTimer = null;
        let countdownValue = 3;
        let workTimerInterval = null;
        let currentTotalSeconds = 0;

        // Modellarni yuklash va foydalanuvchini tekshirish
        async function init() {
            await loadModels();
            await checkUser();
            loadWorkStatus();
        }

        async function loadModels() {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            statusText.innerText = "Sun'iy intellekt yuklanmoqda...";
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                modelsLoaded = true;
                startCamera();
            } catch (err) {
                statusText.innerText = "Xatolik! Modellarni yuklab bo'lmadi.";
            }
        }

        async function checkUser() {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            try {
                const response = await fetch(`/api/user/${userId}`);
                const data = await response.json();
                if (data.ok && data.face_descriptor) {
                    savedDescriptor = new Float32Array(data.face_descriptor);
                    isRegistered = true;
                } else {
                    isRegistered = false;
                }
            } catch (err) {}
        }

        async function loadHistory() {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            try {
                const response = await fetch(`/api/history/${userId}`);
                const data = await response.json();
                if (data.ok && data.history.length > 0) {
                    const last = data.history[0];
                    lastActivityText.innerText = `${last.type === 'in' ? 'Keldi' : 'Ketdi'}: ${last.time}`;
                    isRegistered = true;
                } else {
                    lastActivityText.innerText = "Ro'yxatdan o'tilmagan";
                    isRegistered = false;
                }
            } catch (err) {}
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 640 } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Kameraga ruxsat berilmadi!");
            }
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.scanner-container').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);
            loader.style.display = 'none';

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                const guide = document.getElementById('detection-guide');
                const countdownEl = document.getElementById('countdown');

                if (detections.length > 0) {
                    currentDescriptor = detections[0].descriptor;
                    const box = detections[0].detection.box;
                    const landmarks = detections[0].landmarks;
                    
                    // Masofa va holat tahlili
                    const videoCenter = video.videoWidth / 2;
                    const faceCenter = box.x + box.width / 2;
                    const offset = Math.abs(videoCenter - faceCenter);

                    guide.style.display = 'block';

                    if (box.width < 160) {
                        guide.innerHTML = "🤳 <b>Yaqinroq keling</b>";
                        resetDetectionTimer();
                    } else if (box.width > 380) {
                        guide.innerHTML = "🚶 <b>Orqaroq turing</b>";
                        resetDetectionTimer();
                    } else if (offset > 100) {
                        guide.innerHTML = "🎯 <b>Yuzingizni o'rtaga qo'ying</b>";
                        resetDetectionTimer();
                    } else {
                        // Agar hamma narsa to'g'ri bo'lsa
                        guide.innerHTML = "✨ <b>Yaxshi! Qimirlamang...</b>";
                        document.querySelector('.scan-frame').style.borderColor = '#22c55e';
                        
                        // 3 soniya kutish logikasi
                        if (!promptTriggered && !promptCooldown) {
                            if (!detectionTimer) {
                                countdownValue = 3;
                                countdownEl.innerText = countdownValue;
                                countdownEl.style.display = 'block';
                                
                                detectionTimer = setInterval(() => {
                                    countdownValue--;
                                    if (countdownValue > 0) {
                                        countdownEl.innerText = countdownValue;
                                    } else {
                                        clearInterval(detectionTimer);
                                        detectionTimer = null;
                                        countdownEl.style.display = 'none';
                                        triggerPrompt();
                                    }
                                }, 1000);
                            }
                        }
                    }
                } else {
                    currentDescriptor = null;
                    document.querySelector('.scan-frame').style.borderColor = '#2563eb';
                    resetDetectionTimer();
                    guide.innerHTML = "📷 <b>Kameraga qarang</b>";
                    guide.style.display = 'block';
                }
            }, 500);
        });

        function resetDetectionTimer() {
            if (detectionTimer) {
                clearInterval(detectionTimer);
                detectionTimer = null;
            }
            document.getElementById('countdown').style.display = 'none';
            document.querySelector('.scan-frame').style.borderColor = '#2563eb';
        }

        function triggerPrompt() {
            if (promptTriggered || promptCooldown) return;
            promptTriggered = true;
            tg.showPopup({
                title: 'Davomatni qayd etish',
                message: 'Yuzingiz aniqlandi! Bugun ishga keldizmi yoki ketayapsizmi?',
                buttons: [
                    {id: 'in', type: 'default', text: '👋 Keldim'},
                    {id: 'out', type: 'destructive', text: '🏠 Ketdim'},
                    {type: 'cancel', text: 'Yopish'}
                ]
            }, (buttonId) => {
                if (buttonId === 'in' || buttonId === 'out') {
                    handleCheck(buttonId, true);
                }
                promptCooldown = true;
                setTimeout(() => {
                    promptCooldown = false;
                    promptTriggered = false;
                }, 5000);
            });
        }

        // Ish holatini yuklash va taymerni ishga tushirish
        async function loadWorkStatus() {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            if (!userId) return;

            try {
                const response = await fetch(`/api/history/${userId}`);
                const data = await response.json();
                
                if (data.ok) {
                    const statusSection = document.getElementById('work-status-section');
                    statusSection.style.display = 'block';
                    
                    // Tugmalar holati
                    document.getElementById('btn-in').disabled = (data.last_action === 'in');
                    document.getElementById('btn-out').disabled = (data.last_action !== 'in');

                    // Taymerni yangilash
                    currentTotalSeconds = data.total_seconds;
                    updateTimerDisplay(currentTotalSeconds);
                    
                    if (data.last_action === 'in') {
                        startWorkTimer();
                    } else {
                        stopWorkTimer();
                    }

                    // Birinchi kelgan vaqt
                    document.getElementById('first-in-display').innerText = data.first_in ? `Birinchi kelgan vaqtingiz: ${data.first_in}` : '';

                    // Loglarni chiqarish
                    const logEl = document.getElementById('today-log');
                    logEl.innerHTML = '';
                    data.log.reverse().forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        li.innerHTML = `
                            <span style="font-weight: 600;">${item.type === 'in' ? '👋 Keldi' : '🏠 Ketdi'}</span>
                            <span style="color: var(--text-sub);">${item.time}</span>
                        `;
                        logEl.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("Ish holatini yuklashda xatolik:", err);
            }
        }

        function startWorkTimer() {
            stopWorkTimer();
            workTimerInterval = setInterval(() => {
                currentTotalSeconds++;
                updateTimerDisplay(currentTotalSeconds);
            }, 1000);
        }

        function stopWorkTimer() {
            if (workTimerInterval) clearInterval(workTimerInterval);
        }

        function updateTimerDisplay(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }

        // Davomatni qayd etish
        async function recordAttendance(type, lat, lon) {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            const userName = tg.initDataUnsafe?.user?.first_name || "User";
            
            // O'xshashlikni hisoblash
            let faceMatch = 0;
            if (savedDescriptor && currentDescriptor) {
                const distance = faceapi.euclideanDistance(currentDescriptor, savedDescriptor);
                // 0.6 - standart chegara (threshold). 
                // 0.0 masofa = 100%, 0.6 masofa = ~60% o'xshashlik deb hisoblaymiz.
                faceMatch = Math.round(Math.max(0, 100 - (distance * 100)));
            }

            // Tugmani vaqtincha o'chirib turamiz
            document.getElementById('btn-in').disabled = true;
            document.getElementById('btn-out').disabled = true;

            // Rasmni olish
            let imageData = null;
            try {
                const canvas = document.createElement('canvas');
                const vw = video.videoWidth || 640;
                const vh = video.videoHeight || 480;
                canvas.width = vw;
                canvas.height = vh;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, vw, vh);
                imageData = canvas.toDataURL('image/jpeg', 0.6);
            } catch (e) {
                console.error("Canvas capture error:", e);
            }

            try {
                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        user_name: userName,
                        action_type: type,
                        lat: lat,
                        lon: lon,
                        image: imageData,
                        face_match: faceMatch
                    })
                });
                
                const res = await response.json();
                if (res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert(res.message);
                    loadWorkStatus(); // Yangilash
                } else {
                    tg.showAlert("Xatolik: " + res.message);
                    loadWorkStatus(); // Xato bo'lsa ham statusni qayta yuklaymiz
                }
            } catch (err) {
                tg.showAlert("Serverga ulanishda xatolik!");
                console.error(err);
                loadWorkStatus();
            }
        }

        async function handleCheck(type, skipConfirm = false) {
            if (!currentDescriptor) {
                tg.showAlert("Yuzingiz aniqlanmadi! Iltimos, kameraga qarang.");
                return;
            }

            const userId = tg.initDataUnsafe?.user?.id || 0;
            const userName = tg.initDataUnsafe?.user?.first_name || "User";

            // Yuzni solishtirish (Face Verification)
            if (isRegistered && savedDescriptor) {
                const distance = faceapi.euclideanDistance(currentDescriptor, savedDescriptor);
                if (distance > 0.6) {
                    tg.showAlert("Xatolik! Yuzingiz tizimdagi nusxa bilan mos kelmadi. Siz ushbu xodim emassiz!");
                    fetch('/api/fraud_alert', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, user_name: userName, action_type: type })
                    });
                    return;
                }
            }

            // Geolokatsiyani olish
            let lat = null, lon = null;
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { 
                        enableHighAccuracy: true,
                        timeout: 5000 
                    });
                });
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
            } catch (err) {
                console.warn("GPS kordinatalarini olib bo'lmadi");
            }

            // Agar ro'yxatdan o'tmagan bo'lsa
            if (!isRegistered) {
                tg.showConfirm("Siz hali ro'yxatdan o'tmagansiz. Yuzingizni asosiy model sifatida saqlaymizmi?", async (ok) => {
                    if (ok) {
                        const response = await fetch('/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: userId,
                                user_name: userName,
                                face_descriptor: Array.from(currentDescriptor)
                            })
                        });
                        const res = await response.json();
                        if (res.ok) {
                            tg.showAlert("Ro'yxatdan o'tdingiz! Endi davomatni qayd etish mumkin.");
                            isRegistered = true;
                            savedDescriptor = currentDescriptor;
                            setTimeout(() => handleCheck(type), 500);
                        }
                    }
                });
                return;
            }

            if (skipConfirm) {
                await recordAttendance(type, lat, lon);
            } else {
                tg.showConfirm(`${type === 'in' ? 'Kelganingizni' : 'Ketayotganingizni'} tasdiqlaysizmi?`, async (ok) => {
                    if (ok) await recordAttendance(type, lat, lon);
                });
            }
        }

        const now = new Date();
        document.getElementById('current-date').innerText = "Bugun: " + now.toLocaleDateString('uz-UZ', { weekday: 'long', day: 'numeric', month: 'long' });

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${tg.initDataUnsafe.user.photo_url}" style="width:100%;height:100%;border-radius:14px;">`;
            }
        }

        init();
    </script>
</body>
</html>
