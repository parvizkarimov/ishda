<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ishda | Face ID Davomat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        header {
            padding: 24px;
            background: var(--card);
            border-bottom: 1px solid #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .welcome-text h1 {
            font-size: 18px;
            font-weight: 800;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-sub);
        }

        main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .scanner-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-frame {
            width: 70%;
            height: 70%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .status-card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #e2e8f0;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .status-info h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .status-info p {
            font-size: 12px;
            color: var(--text-sub);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: auto;
            padding-bottom: 24px;
        }

        .btn {
            height: 60px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-in {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-out {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.96);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 32px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="welcome-text">
                    <h1 id="user-name">Xush kelibsiz!</h1>
                    <p id="current-date">Bugun: 26 Aprel, Yakshanba</p>
                </div>
            </div>
        </header>

        <main>
            <div class="scanner-container">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay">
                    <div class="scan-frame"></div>
                </div>
                <div id="loader" class="loading-overlay">
                    <div class="loader"></div>
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">Face ID yuklanmoqda...</p>
                </div>
            </div>

            <div class="status-card">
                <div class="status-icon">🕒</div>
                <div class="status-info">
                    <h3>Oxirgi faollik</h3>
                    <p id="last-activity">Ma'lumot mavjud emas</p>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn btn-in" onclick="handleCheck('in')">
                    <span>👋</span> Keldim
                </button>
                <button class="btn btn-out" onclick="handleCheck('out')">
                    <span>🏠</span> Ketdim
                </button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const statusText = document.querySelector('#loader p');
        const lastActivityText = document.getElementById('last-activity');
        
        let modelsLoaded = false;
        let isRegistered = false;
        let savedDescriptor = null;
        let currentDescriptor = null;

        // Modellarni yuklash va foydalanuvchini tekshirish
        async function init() {
            await loadModels();
            await checkUser();
            loadHistory();
        }

        async function loadModels() {
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            statusText.innerText = "Sun'iy intellekt yuklanmoqda...";
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                modelsLoaded = true;
                startCamera();
            } catch (err) {
                statusText.innerText = "Xatolik! Modellarni yuklab bo'lmadi.";
            }
        }

        async function checkUser() {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            try {
                const response = await fetch(`/api/history/${userId}`);
                const data = await response.json();
                // Agar foydalanuvchi bazada bo'lsa, descriptorini olishimiz kerak
                // Soddalik uchun, birinchi marta kirdi deb hisoblaymiz agar history bo'sh bo'lsa
                // (Aslida alohida endpoint qilsa yaxshi bo'ladi)
            } catch (err) {}
        }

        async function loadHistory() {
            const userId = tg.initDataUnsafe?.user?.id || 0;
            try {
                const response = await fetch(`/api/history/${userId}`);
                const data = await response.json();
                if (data.ok && data.history.length > 0) {
                    const last = data.history[0];
                    lastActivityText.innerText = `${last.type === 'in' ? 'Keldi' : 'Ketdi'}: ${last.time}`;
                    isRegistered = true;
                } else {
                    lastActivityText.innerText = "Ro'yxatdan o'tilmagan";
                    isRegistered = false;
                }
            } catch (err) {}
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 640 } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Kameraga ruxsat berilmadi!");
            }
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.scanner-container').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);
            loader.style.display = 'none';

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if (detections.length > 0) {
                    currentDescriptor = detections[0].descriptor;
                    document.querySelector('.scan-frame').style.borderColor = '#22c55e';
                } else {
                    currentDescriptor = null;
                    document.querySelector('.scan-frame').style.borderColor = '#2563eb';
                }
            }, 500);
        });

        async function handleCheck(type) {
            if (!currentDescriptor) {
                tg.showAlert("Yuzingiz aniqlanmadi! Iltimos, kameraga qarang.");
                return;
            }

            const userId = tg.initDataUnsafe?.user?.id || 0;
            const userName = tg.initDataUnsafe?.user?.first_name || "User";

            // Agar ro'yxatdan o'tmagan bo'lsa - ro'yxatga olamiz
            if (!isRegistered) {
                tg.showConfirm("Siz hali ro'yxatdan o'tmagansiz. Yuzingizni asosiy model sifatida saqlaymizmi?", async (ok) => {
                    if (ok) {
                        const response = await fetch('/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: userId,
                                user_name: userName,
                                face_descriptor: Array.from(currentDescriptor)
                            })
                        });
                        const res = await response.json();
                        if (res.ok) {
                            tg.showAlert("Tabriklaymiz! Ro'yxatdan o'tdingiz. Endi davomat qilishingiz mumkin.");
                            isRegistered = true;
                            loadHistory();
                        }
                    }
                });
                return;
            }

            // Davomatni qayd etish
            tg.showConfirm(`${type === 'in' ? 'Kelganingizni' : 'Ketayotganingizni'} tasdiqlaysizmi?`, async (ok) => {
                if (ok) {
                    const response = await fetch('/api/attendance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: userId,
                            user_name: userName,
                            action_type: type
                        })
                    });
                    const res = await response.json();
                    if (res.ok) {
                        tg.HapticFeedback.notificationOccurred('success');
                        tg.showAlert(res.message);
                        loadHistory();
                    }
                }
            });
        }

        const now = new Date();
        document.getElementById('current-date').innerText = "Bugun: " + now.toLocaleDateString('uz-UZ', { weekday: 'long', day: 'numeric', month: 'long' });

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${tg.initDataUnsafe.user.photo_url}" style="width:100%;height:100%;border-radius:14px;">`;
            }
        }

        init();
    </script>
</body>
</html>
