<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishda | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0 0 10px 0;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
        }

        .table-container {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }

        .btn-export {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-export:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ishda | Admin Boshqaruvi</h1>
            <button class="btn-export" onclick="window.print()">Hisobotni yuklash</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Jami Kelganlar</h3>
                <p id="stat-in">0</p>
            </div>
            <div class="stat-card">
                <h3>Jami Ketganlar</h3>
                <p id="stat-out">0</p>
            </div>
            <div class="stat-card">
                <h3>Bugungi Faollik</h3>
                <p id="stat-today">0</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Xodim</th>
                        <th>Holat</th>
                        <th>Vaqt</th>
                        <th>Masofa (m)</th>
                    </tr>
                </thead>
                <tbody id="attendance-body">
                    <!-- Ma'lumotlar JS orqali keladi -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/admin/all');
                const data = await response.json();
                
                const body = document.getElementById('attendance-body');
                body.innerHTML = '';
                
                let countIn = 0, countOut = 0;

                data.forEach(row => {
                    if (row.type === 'in') countIn++; else countOut++;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 700;">${row.name}</td>
                        <td><span class="badge ${row.type === 'in' ? 'badge-in' : 'badge-out'}">${row.type === 'in' ? 'KELDI' : 'KETDI'}</span></td>
                        <td>${row.time}</td>
                        <td style="color: ${row.distance > 100 ? 'var(--danger)' : 'var(--success)'}; font-weight: 700;">
                            ${row.distance ? Math.round(row.distance) : '?'}
                        </td>
                    `;
                    body.appendChild(tr);
                });

                document.getElementById('stat-in').innerText = countIn;
                document.getElementById('stat-out').innerText = countOut;
                document.getElementById('stat-today').innerText = data.length;

            } catch (err) {
                console.error("Ma'lumot yuklashda xatolik:", err);
            }
        }

        loadData();
        setInterval(loadData, 30000); // Har 30 soniyada yangilab turadi
    </script>
</body>
</html>
