<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishda | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #2563eb;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0 0 10px 0;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
        }

        .table-container {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }

        .btn-export {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-export:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 8px;
            border-radius: 16px;
            width: fit-content;
            border: 1px solid #e2e8f0;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-sub);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-sub);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .attendance-photo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ishda | Admin Boshqaruvi</h1>
            <button class="btn-export" onclick="window.print()">Hisobotni yuklash</button>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('attendance', this)">Davomat</div>
            <div class="tab" onclick="switchTab('employees', this)">Xodimlar</div>
        </div>

        <div id="attendance-section">
            <div class="filter-container">
                <button class="filter-btn active" onclick="setFilter('today', this)">Bugun</button>
                <button class="filter-btn" onclick="setFilter('yesterday', this)">Kecha</button>
                <button class="filter-btn" onclick="setFilter('all', this)">Hammasi</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Jami Kelganlar</h3>
                    <p id="stat-in">0</p>
                </div>
                <div class="stat-card">
                    <h3>Jami Ketganlar</h3>
                    <p id="stat-out">0</p>
                </div>
                <div class="stat-card">
                    <h3>Soni</h3>
                    <p id="stat-today">0</p>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Rasm</th>
                            <th>Xodim</th>
                            <th>Sana</th>
                            <th>Keldi</th>
                            <th>Ketdi</th>
                            <th>Masofa (m)</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-body">
                        <!-- Ma'lumotlar JS orqali keladi -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="employees-section" style="display: none;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ism</th>
                            <th>Username</th>
                            <th>Telefon</th>
                            <th>Ro'yxatdan o'tdi</th>
                        </tr>
                    </thead>
                    <tbody id="employees-body">
                        <!-- Xodimlar JS orqali keladi -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="photoModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" src="">
    </div>

    <script>
        let currentFilter = 'today';

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            if (tab === 'attendance') {
                document.getElementById('attendance-section').style.display = 'block';
                document.getElementById('employees-section').style.display = 'none';
                loadData();
            } else {
                document.getElementById('attendance-section').style.display = 'none';
                document.getElementById('employees-section').style.display = 'block';
                loadEmployees();
            }
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        function showPhoto(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('photoModal').style.display = 'flex';
        }

        async function loadEmployees() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                const body = document.getElementById('employees-body');
                body.innerHTML = '';
                
                data.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td style="font-weight: 700;">${u.name}</td>
                        <td>${u.username ? '@' + u.username : '-'}</td>
                        <td>${u.phone || '-'}</td>
                        <td>${u.created_at}</td>
                    `;
                    body.appendChild(tr);
                });
            } catch (err) {
                console.error("Xodimlar yuklashda xatolik:", err);
            }
        }

        async function loadData() {
            try {
                const response = await fetch(`/api/admin/all?filter=${currentFilter}`);
                const data = await response.json();
                
                const body = document.getElementById('attendance-body');
                body.innerHTML = '';
                
                let countIn = 0, countOut = 0;

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    const inPhoto = row.in_photo ? `<img src="${row.in_photo}" class="attendance-photo" onclick="showPhoto('${row.in_photo}')">` : '🖼️';
                    const outPhoto = row.out_photo ? `<img src="${row.out_photo}" class="attendance-photo" onclick="showPhoto('${row.out_photo}')">` : '';
                    
                    if (row.in_time !== '-') countIn++;
                    if (row.out_time !== '-') countOut++;

                    tr.innerHTML = `
                        <td>
                            <div style="display: flex; gap: 5px;">
                                ${inPhoto} ${outPhoto}
                            </div>
                        </td>
                        <td style="font-weight: 700;">${row.name}</td>
                        <td>${row.date}</td>
                        <td><span class="badge ${row.in_time !== '-' ? 'badge-in' : ''}">${row.in_time}</span></td>
                        <td><span class="badge ${row.out_time !== '-' ? 'badge-out' : ''}">${row.out_time}</span></td>
                        <td style="color: ${row.distance > 100 ? 'var(--danger)' : 'var(--success)'}; font-weight: 700;">
                            ${row.distance ? Math.round(row.distance) : '?'}
                        </td>
                    `;
                    body.appendChild(tr);
                });

                document.getElementById('stat-in').innerText = countIn;
                document.getElementById('stat-out').innerText = countOut;
                document.getElementById('stat-today').innerText = data.length;

            } catch (err) {
                console.error("Ma'lumot yuklashda xatolik:", err);
            }
        }

        loadData();
        setInterval(() => {
            if (document.getElementById('attendance-section').style.display !== 'none') {
                loadData();
            }
        }, 30000);
    </script>
</body>
</html>
